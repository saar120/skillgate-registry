name: "Check: Gitleaks"

on:
  workflow_call:
    inputs:
      owner:
        required: true
        type: string
      repo:
        required: true
        type: string
    outputs:
      result:
        description: "pass or review"
        value: ${{ jobs.scan.outputs.result }}

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.scan.outputs.result }}
    steps:
      - name: Clone upstream
        env:
          OWNER: ${{ inputs.owner }}
          REPO: ${{ inputs.repo }}
        run: |
          git clone --depth 1 "https://github.com/$OWNER/$REPO.git" /tmp/plugin
          rm -rf /tmp/plugin/.git

      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Scan
        id: scan
        run: |
          set +e
          gitleaks detect --source /tmp/plugin --no-git \
            --report-format json --report-path /tmp/report.json 2>&1
          EXIT=$?
          set -e
          if [ $EXIT -eq 0 ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "No secrets found"
          else
            echo "result=review" >> "$GITHUB_OUTPUT"
            echo "Potential secrets found — flagged for review"
            jq -r '.[] | "::warning file=\(.File),line=\(.StartLine)::\(.Description)"' \
              /tmp/report.json 2>/dev/null || true
          fi
