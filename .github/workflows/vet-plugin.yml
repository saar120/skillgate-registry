name: Vet Plugin

on:
  workflow_dispatch:
    inputs:
      upstream_url:
        description: "GitHub URL of the plugin (e.g. github.com/obra/superpowers)"
        required: true
        type: string

permissions:
  contents: write
  issues: write

jobs:
  vet:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_URL: ${{ inputs.upstream_url }}
      REPO_OWNER: ${{ github.repository_owner }}
      SERVER_URL: ${{ github.server_url }}
      REPO_FULL: ${{ github.repository }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse plugin URL
        id: parse
        run: |
          REPO_PATH=$(echo "$UPSTREAM_URL" | sed -E 's|^https?://||; s|^github\.com/||; s|\.git$||; s|/$||')
          OWNER=$(echo "$REPO_PATH" | cut -d'/' -f1)
          REPO=$(echo "$REPO_PATH" | cut -d'/' -f2)
          if [ -z "$OWNER" ] || [ -z "$REPO" ]; then
            echo "::error::Invalid URL. Use: github.com/owner/repo"
            exit 1
          fi
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "name=$REPO" >> "$GITHUB_OUTPUT"
          echo "Vetting $OWNER/$REPO"

      - name: Clone upstream
        env:
          PLUGIN_OWNER: ${{ steps.parse.outputs.owner }}
          PLUGIN_REPO: ${{ steps.parse.outputs.repo }}
        run: |
          git clone --depth 1 \
            "https://github.com/${PLUGIN_OWNER}/${PLUGIN_REPO}.git" \
            /tmp/plugin
          rm -rf /tmp/plugin/.git

      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Scan for secrets
        id: scan
        run: |
          set +e
          gitleaks detect --source /tmp/plugin --no-git \
            --report-format json --report-path /tmp/gitleaks-report.json 2>&1
          EXIT=$?
          set -e
          if [ $EXIT -eq 0 ]; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
            echo "No secrets found"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "Secrets detected"
          fi

      - name: Publish to registry
        if: steps.scan.outputs.result == 'PASS'
        env:
          NAME: ${{ steps.parse.outputs.name }}
          PLUGIN_OWNER: ${{ steps.parse.outputs.owner }}
          PLUGIN_REPO: ${{ steps.parse.outputs.repo }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Copy plugin into plugins/{name}/
          rm -rf "plugins/$NAME"
          mkdir -p plugins
          cp -a /tmp/plugin "plugins/$NAME"

          # Regenerate marketplace.json from plugins/ directory
          mkdir -p .claude-plugin
          PLUGINS='[]'
          for dir in plugins/*/; do
            [ -d "$dir" ] || continue
            P=$(basename "$dir")
            PLUGINS=$(echo "$PLUGINS" | jq --arg n "$P" \
              '. + [{"name":$n,"source":("./plugins/"+$n),"description":("Vetted: "+$n)}]')
          done
          jq -n \
            --arg owner "$REPO_OWNER" \
            --argjson plugins "$PLUGINS" \
            '{
              name: ($owner + "-skillgate"),
              owner: { name: $owner },
              metadata: { description: "SkillGate vetted plugins", version: "1.0.0" },
              plugins: $plugins
            }' > .claude-plugin/marketplace.json

          # Commit & push
          git config user.name "SkillGate Bot"
          git config user.email "skillgate@users.noreply.github.com"
          git add plugins/ .claude-plugin/
          git diff --cached --quiet && { echo "No changes to publish"; exit 0; }
          git commit -m "publish: $NAME from $PLUGIN_OWNER/$PLUGIN_REPO"
          git push origin main

          # Tag & release
          LAST=$(git tag -l "$NAME/v*" | sed "s|$NAME/v||" | sort -n | tail -1)
          VERSION=$(( ${LAST:-0} + 1 ))
          TAG="$NAME/v$VERSION"
          git tag -a "$TAG" -m "$NAME v$VERSION"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$NAME v$VERSION" \
            --notes "Vetted copy of [$PLUGIN_OWNER/$PLUGIN_REPO](https://github.com/$PLUGIN_OWNER/$PLUGIN_REPO)"

      - name: Report failure
        if: steps.scan.outputs.result == 'FAIL'
        env:
          NAME: ${{ steps.parse.outputs.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FINDINGS=$(jq -r \
            '.[] | "- **\(.File)**:\(.StartLine) — \(.Description)"' \
            /tmp/gitleaks-report.json 2>/dev/null \
            || echo "See workflow run for details")
          cat > /tmp/issue-body.md <<EOF
          ## Gitleaks scan failed

          **Plugin:** \`$NAME\`
          **Source:** $UPSTREAM_URL
          **Run:** $SERVER_URL/$REPO_FULL/actions/runs/$RUN_ID

          ### Findings
          $FINDINGS
          EOF
          gh issue create \
            --title "Failed: $NAME" \
            --body-file /tmp/issue-body.md

      - name: Summary
        if: always()
        env:
          RESULT: ${{ steps.scan.outputs.result }}
          NAME: ${{ steps.parse.outputs.name }}
        run: |
          echo "## $NAME: $RESULT" >> "$GITHUB_STEP_SUMMARY"
          echo "**Source:** $UPSTREAM_URL" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RESULT" = "PASS" ]; then
            echo "Published to registry." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Issue created with details." >> "$GITHUB_STEP_SUMMARY"
          fi
