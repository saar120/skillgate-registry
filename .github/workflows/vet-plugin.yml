name: Vet Plugin

on:
  workflow_dispatch:
    inputs:
      upstream_url:
        description: "GitHub URL (e.g. github.com/obra/superpowers)"
        required: true
        type: string

permissions:
  contents: write

jobs:

  # ── Stage 1: Validate ─────────────────────────────────────────
  pre-check:
    name: Pre-check
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.parse.outputs.owner }}
      repo: ${{ steps.parse.outputs.repo }}
      name: ${{ steps.parse.outputs.name }}
      exists: ${{ steps.registry.outputs.exists }}
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4

      - name: Parse URL
        id: parse
        env:
          UPSTREAM_URL: ${{ inputs.upstream_url }}
        run: |
          REPO_PATH=$(echo "$UPSTREAM_URL" | sed -E 's|^https?://||; s|^github\.com/||; s|\.git$||; s|/$||')
          OWNER=$(echo "$REPO_PATH" | cut -d'/' -f1)
          REPO=$(echo "$REPO_PATH" | cut -d'/' -f2)
          if [ -z "$OWNER" ] || [ -z "$REPO" ]; then
            echo "::error::Invalid URL. Use: github.com/owner/repo"
            exit 1
          fi
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "name=$REPO" >> "$GITHUB_OUTPUT"

      - name: Verify upstream exists
        env:
          OWNER: ${{ steps.parse.outputs.owner }}
          REPO: ${{ steps.parse.outputs.repo }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh api "repos/$OWNER/$REPO" --silent 2>/dev/null; then
            echo "::error::Cannot access $OWNER/$REPO"
            exit 1
          fi
          echo "Upstream verified"

      - name: Check registry
        id: registry
        env:
          NAME: ${{ steps.parse.outputs.name }}
        run: |
          if [ -d "plugins/$NAME" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Plugin exists — will update"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New plugin"
          fi

  # ── Stage 2: Security checks (parallel) ───────────────────────
  # To add a check:
  #   1. Create .github/workflows/check-{name}.yml (see check-gitleaks.yml)
  #   2. Add a job below with: needs: pre-check, uses: ./.github/workflows/check-{name}.yml
  #   3. Add it to the decide job's needs + aggregate step

  gitleaks:
    name: Gitleaks
    needs: pre-check
    uses: ./.github/workflows/check-gitleaks.yml
    with:
      owner: ${{ needs.pre-check.outputs.owner }}
      repo: ${{ needs.pre-check.outputs.repo }}

  # ── Stage 3: Aggregate results ────────────────────────────────
  decide:
    name: Decide
    needs: [pre-check, gitleaks]
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.aggregate.outputs.result }}
    steps:
      - name: Aggregate check results
        id: aggregate
        env:
          GITLEAKS: ${{ needs.gitleaks.outputs.result }}
        run: |
          CHECKS="$GITLEAKS"
          # Future: CHECKS="$GITLEAKS $TRIVY $PATTERNS"

          HAS_FAIL=false
          HAS_REVIEW=false
          for r in $CHECKS; do
            case "$r" in
              fail)   HAS_FAIL=true ;;
              review) HAS_REVIEW=true ;;
            esac
          done

          if $HAS_FAIL; then
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "::error::Security checks failed"
          elif $HAS_REVIEW; then
            echo "result=REVIEW" >> "$GITHUB_OUTPUT"
            echo "::warning::Needs human review"
          else
            echo "result=PASS" >> "$GITHUB_OUTPUT"
            echo "All checks passed"
          fi

  # ── Stage 4: Publish (auto or after approval) ─────────────────
  # TODO: When the repo is on a paid plan or made public, enable
  # human-in-the-loop approval by uncommenting the environment line
  # and adding required reviewers:
  #   Settings → Environments → review → Required reviewers
  # Then uncomment:
  #   environment: ${{ needs.decide.outputs.result == 'REVIEW' && 'review' || '' }}
  # For now, REVIEW auto-approves (same as PASS).

  publish:
    name: Publish
    needs: [pre-check, decide]
    if: needs.decide.outputs.result != 'FAIL'
    concurrency:
      group: publish
      cancel-in-progress: false
    runs-on: ubuntu-latest
    env:
      NAME: ${{ needs.pre-check.outputs.name }}
      PLUGIN_OWNER: ${{ needs.pre-check.outputs.owner }}
      PLUGIN_REPO: ${{ needs.pre-check.outputs.repo }}
      REPO_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone upstream
        run: |
          git clone --depth 1 "https://github.com/$PLUGIN_OWNER/$PLUGIN_REPO.git" /tmp/plugin
          rm -rf /tmp/plugin/.git

      - name: Copy to registry
        run: |
          rm -rf "plugins/$NAME"
          mkdir -p plugins
          cp -a /tmp/plugin "plugins/$NAME"

      - name: Generate marketplace.json
        run: |
          mkdir -p .claude-plugin
          PLUGINS='[]'
          for dir in plugins/*/; do
            [ -d "$dir" ] || continue
            P=$(basename "$dir")
            PLUGINS=$(echo "$PLUGINS" | jq --arg n "$P" \
              '. + [{"name":$n,"source":("./plugins/"+$n),"description":("Vetted: "+$n)}]')
          done
          jq -n \
            --arg owner "$REPO_OWNER" \
            --argjson plugins "$PLUGINS" \
            '{
              name: ($owner + "-skillgate"),
              owner: { name: $owner },
              metadata: { description: "SkillGate vetted plugins", version: "1.0.0" },
              plugins: $plugins
            }' > .claude-plugin/marketplace.json

      - name: Commit & push
        run: |
          git config user.name "SkillGate Bot"
          git config user.email "skillgate@users.noreply.github.com"
          git add plugins/ .claude-plugin/
          git diff --cached --quiet && { echo "No changes"; exit 0; }
          git commit -m "publish: $NAME from $PLUGIN_OWNER/$PLUGIN_REPO"
          git pull --rebase origin main
          git push origin main

      - name: Tag & release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          LAST=$(git tag -l "$NAME/v*" | sed "s|$NAME/v||" | sort -n | tail -1)
          VERSION=$(( ${LAST:-0} + 1 ))
          TAG="$NAME/v$VERSION"
          git tag -a "$TAG" -m "$NAME v$VERSION"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$NAME v$VERSION" \
            --notes "Vetted copy of [$PLUGIN_OWNER/$PLUGIN_REPO](https://github.com/$PLUGIN_OWNER/$PLUGIN_REPO)"

      - name: Summary
        env:
          UPSTREAM_URL: ${{ inputs.upstream_url }}
        run: |
          echo "## Published: $NAME v$VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "**Source:** $UPSTREAM_URL" >> "$GITHUB_STEP_SUMMARY"
